<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Byte ⊹ Staying in my own little bubble</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="bubble-container">
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
    </div>

    <main class="bento-grid">
        
        <article class="bento-box profile-box glass">
            <img src="./assets/images/byte-sunset.jpg" alt="Byte the Fursona looking back in a sunset field" class="profile-img">
            <div class="profile-text">
                <h1>BYTE</h1>
                <p class="pronouns">HE/HIM ⊹ GMT+1</p>
            </div>
        </article>

        <article class="bento-box bio-box glass">
            <h2>🫧 Vibe</h2>
            <p>Quiet & cozy. Staying in my own little bubble.</p>
        </article>

        <article class="bento-box status-box glass" id="discord-status-container">
            <h2>🍃 Fact</h2>
            <p id="discord-status-text">Expert at doing nothing.</p>
            <div class="status-indicator" id="status-dot"></div>
        </article>

        <article class="bento-box socials-box glass">
            <h2>🧸 Socials</h2>
            <p class="subtext">Just a bit shy...</p>
            <div class="link-buttons">
                <a href="https://discord.com" class="social-btn">Discord</a>
                <a href="https://github.com" class="social-btn">GitHub</a>
                <a href="https://twitter.com" class="social-btn">Twitter</a>
            </div>
        </article>

        <article class="bento-box gallery-box glass">
            <img src="./assets/images/byte-dark.jpg" alt="Byte in an ambient lit room" class="gallery-img">
        </article>

    </main>

    <script src="script.js"></script>
</body>
</html>
