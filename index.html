<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Byte ⊹ Staying in my own little bubble</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="bubble-container">
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
    </div>

    <main class="bento-grid">
        <article class="bento-box profile-box glass">
            <img src="./assets/images/byte-sunset.jpg" alt="Byte" class="profile-img">
            <div class="profile-text">
                <h1>BYTE</h1>
                <p class="pronouns">HE/HIM ⊹ GMT+1</p>
            </div>
        </article>

        <article class="bento-box bio-box glass">
            <h2>🫧 Vibe</h2>
            <p>Quiet & cozy. Staying in my own little bubble.</p>
        </article>

        <article class="bento-box status-box glass">
            <h2>🍃 Status</h2>
            <p id="discord-status-text">Checking Discord...</p>
            <div class="status-row">
                <div class="status-indicator" id="status-dot"></div>
                <span id="status-label" class="subtext">Offline</span>
            </div>
        </article>

       <article class="bento-box socials-box glass">
            <h2>🧸 Socials</h2>
            <div class="link-buttons">
                <a href="#" class="social-btn"><span class="icon">💬</span> Discord</a>
                <a href="#" class="social-btn"><span class="icon">💻</span> GitHub</a>
                <a href="#" class="social-btn"><span class="icon">🐦</span> Twitter</a>
            </div>
        </article>

        <article class="bento-box quotes-box glass">
            <h2>💭 Thoughts</h2>
            <p class="quote-text">"Staying in my own little bubble, where the stars shine a bit brighter."</p>
            <p class="subtext">— Byte</p>
        </article>

        <article class="bento-box gallery-box glass">
            <img src="./assets/images/byte-dark.jpg" alt="Gallery" class="gallery-img">
        </article>
    </main>

    <script src="script.js"></script>
</body>
</html>
